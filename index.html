<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spendly – Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app" id="app">
  <header class="app-header">
    <div class="header-top">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 6v12M9 9.5h6"/>
        </svg>
      </div>
      <div>
        <div class="header-title">Spendly</div>
      </div>
    </div>
    <div class="header-sub">Smart spending, simple tracking.</div>
  </header>

  <div class="app-body">
    <form class="create-form" id="createForm">
      <div class="input-group">
        <label for="catInput">Expense Name</label>
        <input type="text" id="catInput" placeholder="e.g. Groceries, Market Run" autocomplete="off" maxlength="60">
      </div>
      <button type="submit" class="btn-create" id="createBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add
      </button>
    </form>
    <div id="createError" class="form-error"></div>

    <p class="form-helper">Create an expense category (e.g., Shopping, Feeding, Transport) and add the individual items you purchased along with their prices below.</p>

    <div class="section-header">
      <h2>Expenses</h2>
      <span class="expense-count" id="expenseCount">0</span>
    </div>

    <div id="expenseList">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">&#128176;</div>
        <p>No expenses yet</p>
        <div class="empty-sub">Create an expense group above, then add items to it</div>
      </div>
    </div>

    <div class="total-bar">
      <span class="total-label">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Total
      </span>
      <span class="total-amount"><span class="curr">&#8358;</span><span id="totalDisplay">0.00</span></span>
    </div>

    <div class="clear-all-wrap">
      <button class="btn-clear" id="clearAllBtn" disabled>Clear all expenses</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
